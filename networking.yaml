AWSTemplateFormatVersion: '2010-09-09'
Description: LKS 2024 - Networking Infrastructure

Resources:

  # ── VPC ────────────────────────────────────────
  LKSVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 172.15.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{Key: Name, Value: lks-2024-vpc}]

  # ── Internet Gateway ───────────────────────────
  IGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{Key: Name, Value: lks-igw}]
  IGWAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref LKSVPC
      InternetGatewayId: !Ref IGW

  # ── Public Subnets (172.15.0-2.0/24) ──────────
  PubSubA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LKSVPC
      CidrBlock: 172.15.0.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags: [{Key: Name, Value: lks-public-a}]
  PubSubB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LKSVPC
      CidrBlock: 172.15.1.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags: [{Key: Name, Value: lks-public-b}]
  PubSubC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LKSVPC
      CidrBlock: 172.15.2.0/24
      AvailabilityZone: !Select [2, !GetAZs '']
      Tags: [{Key: Name, Value: lks-public-c}]

  # ── Private Subnets (172.15.3-5.0/24) ─────────
  PriSubA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LKSVPC
      CidrBlock: 172.15.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags: [{Key: Name, Value: lks-private-a}]
  PriSubB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LKSVPC
      CidrBlock: 172.15.4.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags: [{Key: Name, Value: lks-private-b}]
  PriSubC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LKSVPC
      CidrBlock: 172.15.5.0/24
      AvailabilityZone: !Select [2, !GetAZs '']
      Tags: [{Key: Name, Value: lks-private-c}]

  # ── NAT Gateway (di public subnet A) ──────────
  EIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttach
    Properties: {Domain: vpc}
  NAT:
    Type: AWS::EC2::NatGateway
    Properties:
      SubnetId: !Ref PubSubA
      AllocationId: !GetAtt EIP.AllocationId
      Tags: [{Key: Name, Value: lks-nat}]

  # ── Route Table Public ─────────────────────────
  RTPublic:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref LKSVPC
      Tags: [{Key: Name, Value: lks-rt-public}]
  RoutePublic:
    Type: AWS::EC2::Route
    DependsOn: IGWAttach
    Properties:
      RouteTableId: !Ref RTPublic
      DestinationCidrBlock: 172.15.0.0/16
      GatewayId: !Ref IGW
  AssocPubA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PubSubA, RouteTableId: !Ref RTPublic}
  AssocPubB:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PubSubB, RouteTableId: !Ref RTPublic}
  AssocPubC:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PubSubC, RouteTableId: !Ref RTPublic}

  # ── Route Table Private ────────────────────────
  RTPrivate:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref LKSVPC
      Tags: [{Key: Name, Value: lks-rt-private}]
  RoutePrivate:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RTPrivate
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NAT
  AssocPriA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PriSubA, RouteTableId: !Ref RTPrivate}
  AssocPriB:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PriSubB, RouteTableId: !Ref RTPrivate}
  AssocPriC:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref PriSubC, RouteTableId: !Ref RTPrivate}

  # ── Security Group RDS ────────────────────────
  SGDB:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: SG-DB
      GroupDescription: Allow MariaDB from private subnets
      VpcId: !Ref LKSVPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 3306, ToPort: 3306, CidrIp: 172.15.3.0/24}
        - {IpProtocol: tcp, FromPort: 3306, ToPort: 3306, CidrIp: 172.15.4.0/24}
        - {IpProtocol: tcp, FromPort: 3306, ToPort: 3306, CidrIp: 172.15.5.0/24}
      Tags: [{Key: Name, Value: SG-DB}]

Outputs:
  VpcId: {Value: !Ref LKSVPC, Export: {Name: lks-VpcId}}
  PriSubA: {Value: !Ref PriSubA, Export: {Name: lks-PriSubA}}
  PriSubB: {Value: !Ref PriSubB, Export: {Name: lks-PriSubB}}
  PriSubC: {Value: !Ref PriSubC, Export: {Name: lks-PriSubC}}
  SGDB: {Value: !Ref SGDB, Export: {Name: lks-SGDB}}